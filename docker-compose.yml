services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Replace with your real Supabase values when ready
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    # Optional: serve behind nginx on port 80/443 instead
    # ports:
    #   - "80:3000"
